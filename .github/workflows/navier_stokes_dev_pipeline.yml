name: Navier–Stokes Solver Pipeline

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  integrated_dev_flow:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}
      APP_KEY: ${{ secrets.APP_KEY }}
      APP_SECRET: ${{ secrets.APP_SECRET }}
      REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}

    steps:
      - name: 🗂️ Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install Lean Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧹 Auto-Clean (Autoflake)
        run: |
          autoflake --in-place --recursive --remove-unused-variables --remove-all-unused-imports src tests

      - name: 🧹 Static Analysis & Lint (Ruff)
        run: |
          ruff check src tests --fix

      - name: 🚀 Commit & Push Auto-Clean Changes
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🧹 Auto-clean: structural hygiene"
            git push || echo "Push skipped: branch protected."
          fi

      - name: 💀 Dead Code Audit (Vulture)
        run: |
          # Run vulture and capture output
          # If any dead code is found, vulture exits with non-zero code
          # which automatically kills the GitHub Action.
          vulture src --min-confidence 70

      - name: 🧪 Quality Gate Check
        if: failure()
        run: |
          echo "CRITICAL: Dead code detected in src/. Review the Vulture logs above."
          echo "Rule 2 (Zero-Debt Mandate) violation: Delete unused code before merging."
          exit 1

      - name: 🧪 Run Logic & Scientific Verification
        run: |
          # Rule 6: Audit-driven coverage
          # Rule 7: Scientific Testing Suite must pass
          # pytest -s tests/ -vv --cov=src --cov-report=term-missing
          python3 -c "from src.common.solver_input import SolverInput; import json; d = {'domain_configuration': {'type': 'INTERNAL'}, 'grid': {'nx': 4, 'ny': 4, 'nz': 4, 'x_min': 0.0, 'x_max': 1.0, 'y_min': 0.0, 'y_max': 1.0, 'z_min': 0.0, 'z_max': 1.0}, 'fluid_properties': {'density': 1000.0, 'viscosity': 0.001}, 'initial_conditions': {'velocity': [0.0, 0.0, 0.0], 'pressure': 0.0}, 'simulation_parameters': {'time_step': 0.001, 'total_time': 0.002, 'output_interval': 1}, 'external_forces': {'force_vector': [0.0, 0.0, -9.81]}, 'mask': [0]*64, 'boundary_conditions': []}; s = SolverInput.from_dict(d); print(f'Accessing type: {s.domain_configuration.type}'); print(f'Accessing ref_vel: {s.domain_configuration.reference_velocity if hasattr(s.domain_configuration, \"_reference_velocity\") and s.domain_configuration._reference_velocity is not None else \"NOT_SET\"}')"

      - name: 📊 Audit Performance & Update Ledger
        if: always()
        env:
          GIT_USER_NAME: ${{ secrets.GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ secrets.GIT_USER_EMAIL }}
        run: |
          # 1. Define the new entry
          RUN_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          STATUS="${{ job.status }}"
          # Note: We calculate duration more reliably here
          DURATION_SEC=$(( $(date +%s) - $(date -d "${{ github.event.repository.pushed_at }}" +%s 2>/dev/null || date +%s) ))
          CPU_LOAD=$(top -bn1 | grep "Cpu(s)" | awk '{print $2 + $4 "%"}')
          MEM_USAGE=$(free -m | awk '/Mem:/ { print $3 "/" $2 "MB" }')
          FAILURE_POINT="N/A"
          [ "$STATUS" != "success" ] && FAILURE_POINT="Check GitHub Action logs for failure details"

          # 2. Create the new entry block
          NEW_ENTRY=$(cat <<EOF
          ### Audit: $RUN_DATE
          - **Status:** $STATUS
          - **Duration:** ${DURATION_SEC}s
          - **CPU Load:** $CPU_LOAD
          - **Memory Usage:** $MEM_USAGE
          - **Failure Point:** $FAILURE_POINT
          
          EOF
          )

          # 3. Prepend to file (Newest on top)
          # We keep the Header, then inject the new entry, then append the old content
          echo "# 🌊 Navier–Stokes Performance Audit Ledger" > performance_audit.md
          echo "$NEW_ENTRY" >> performance_audit.md
          # Append everything after the first line of the old file (skipping the old header)
          [ -f old_audit.md ] && tail -n +2 old_audit.md >> performance_audit.md
          
          # 4. Commit and Push
          git config --global user.name "${GIT_USER_NAME:-'github-actions[bot]'}"
          git config --global user.email "${GIT_USER_EMAIL:-'github-actions[bot]@users.noreply.github.com'}"
          git add performance_audit.md
          git commit -m "📊 perf-audit: log metrics for $RUN_DATE"
          git push origin HEAD || echo "Push skipped."