# ruff.toml

[lint]
# Select the rules: 
# E9, F63, F7, F82: Critical syntax/undefined variable checks
# F401: Unused imports
# F841: Unused variables
# I: Import sorting
# UP: Modern Python syntax
# B: flake8-bugbear (logic protector)
select = [
    "E9", "F63", "F7", "F82", 
    "F401", "F841", 
    "I", 
    "UP", 
    "B"
]

ignore = []

[format]
# Enable auto-formatting preview
preview = true

[lint.isort]
# Ensure imports are sorted correctly
known-first-party = ["src"]
